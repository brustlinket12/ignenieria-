<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDC · Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-icon">&#x1F6E1;</div>
      <h1 class="login-title">DDC · Ley 23/2015</h1>
      <p class="login-subtitle">Sistema de Debida Diligencia Continua</p>

      <form action="/mfa" method="get" class="login-form" onsubmit="guardarRol()">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" value="ana.kyc@ddc.co" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" value="password123" class="form-input" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">&#x1F441;</button>
          </div>
        </div>

        <div class="form-group">
          <label for="rol">Rol (demo)</label>
          <select id="rol" class="form-input">
            <option value="OFICIAL_KYC">Oficial KYC</option>
            <option value="OFICIAL_CUMPLIMIENTO">Oficial de Cumplimiento</option>
            <option value="AUDITOR_INTERNO">Auditor Interno</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
      </form>

      <div class="login-footer">
        <p>República de Panamá</p>
        <p>UAF · SBP · AML</p>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }
    function guardarRol() {
      const rol = document.getElementById('rol').value;
      localStorage.setItem('rol', rol);
    }
  </script>
</body>
</html>
